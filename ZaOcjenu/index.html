<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>Elektrotehnički kalkulator</title>

    <style>
        body{
            background-color: #eef2f3;
            font-family: Arial;
        }

        .sek{
            width: 650px;
            margin: 40px auto;
            background-color: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: red;
        }

        h1{
            text-align: center;
        }

        label{
            display: inline-block;
            width: 230px;
            font-size: 18px;
        }

        input{
            width: 150px;
            height: 25px;
            border-radius: 5px;
            border: 1px solid gray;
        }

        button{
            width: 100%;
            height: 40px;
            border-radius: 20px;
            background-color: #4dd0e1;
            border: none;
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
        }

        button:hover{
            background-color: pink;
            color: white;
        }

        .rez{
            margin-top: 20px;
            height: 70px;
            border: 3px solid black;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }
    </style>
</head>
<body>


<div class="sek">
    <h1>Ohmov zakon</h1>
    <label>Napon U (V):</label><input type="text" id="u"><br><br>
    <label>Otpor R (Ω):</label><input type="text" id="r"><br>
    <button id="btn1">Izračunaj struju I</button>
    <div class="rez" id="rez1"></div>
</div>


<div class="sek">
    <h1>Djelilo napona</h1>
    <label>R1 (Ω):</label><input type="text" id="r1"><br><br>
    <label>R2 (Ω):</label><input type="text" id="r2"><br><br>
    <label>Uul (V):</label><input type="text" id="uul"><br>
    <button id="btn2">Izračunaj Uiz</button>
    <div class="rez" id="rez2"></div>
</div>


<div class="sek">
    <h1>Serijsko spajanje otpornika</h1>
    <label>R1 (Ω):</label><input type="text" id="sr1"><br><br>
    <label>R2 (Ω):</label><input type="text" id="sr2"><br><br>
    <label>R3 (Ω):</label><input type="text" id="sr3"><br>
    <button id="btn3">Izračunaj Ru</button>
    <div class="rez" id="rez3"></div>
</div>


<div class="sek">
    <h1>Paralelno spajanje otpornika</h1>
    <label>R1 (Ω):</label><input type="text" id="pr1"><br><br>
    <label>R2 (Ω):</label><input type="text" id="pr2"><br><br>
    <label>R3 (Ω):</label><input type="text" id="pr3"><br>
    <button id="btn4">Izračunaj Ru</button>
    <div class="rez" id="rez4"></div>
</div>


<div class="sek">
    <h1>Serijsko spajanje kondenzatora</h1>
    <label>C1 (F):</label><input type="text" id="sc1"><br><br>
    <label>C2 (F):</label><input type="text" id="sc2"><br><br>
    <label>C3 (F):</label><input type="text" id="sc3"><br>
    <button id="btn5">Izračunaj Cu</button>
    <div class="rez" id="rez5"></div>
</div>


<div class="sek">
    <h1>Paralelno spajanje kondenzatora</h1>
    <label>C1 (F):</label><input type="text" id="pc1"><br><br>
    <label>C2 (F):</label><input type="text" id="pc2"><br><br>
    <label>C3 (F):</label><input type="text" id="pc3"><br>
    <button id="btn6">Izračunaj Cu</button>
    <div class="rez" id="rez6"></div>
</div>


<div class="sek">
    <h1>Induktivni otpor</h1>
    <label>ω (Hz):</label><input type="text" id="w"><br><br>
    <label>L (H):</label><input type="text" id="l"><br>
    <button id="btn7">Izračunaj XL</button>
    <div class="rez" id="rez7"></div>
</div>



<div class="sek">
    <h1>Serijsko spajanje zavojnica</h1>

    <label>L1 (H):</label>
    <input type="text" id="sl1"><br><br>

    <label>L2 (H):</label>
    <input type="text" id="sl2"><br><br>

    <label>L3 (H):</label>
    <input type="text" id="sl3"><br>

    <button id="btn8">Izračunaj Lu</button>

    <div class="rez" id="rez8"></div>
</div>


<div class="sek">
    <h1>Paralelno spajanje zavojnica</h1>

    <label>L1 (H):</label>
    <input type="text" id="pl1"><br><br>

    <label>L2 (H):</label>
    <input type="text" id="pl2"><br><br>

    <label>L3 (H):</label>
    <input type="text" id="pl3"><br>

    <button id="btn9">Izračunaj Lu</button>

    <div class="rez" id="rez9"></div>
</div>


<div class="sek">
    <h1>Induktivitet zracnog svitka</h1>

    <label>Broj zavoja:</label>
    <input type="text" id="n"><br><br>

    <label>Površina S:</label>
    <input type="text" id="s"><br><br>

    <label>Duljina svitka l:</label>
    <input type="text" id="d"><br>

    <button id="btn10">Izračunaj L</button>

    <div class="rez" id="rez10"></div>
</div>


<script src="index.js"></script>
</body>
</html>
